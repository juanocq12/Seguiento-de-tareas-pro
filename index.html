<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador Mensual Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; color: #1e293b; }
        .month-card { background: white; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .progress-ring { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .week-section { border-left: 2px solid #e2e8f0; padding-left: 1.5rem; position: relative; }
        .week-section::before { content: ''; position: absolute; left: -6px; top: 0; width: 10px; height: 10px; background: #3b82f6; border-radius: 50%; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app" class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900">Planificador <span class="text-blue-600">Mensual</span></h1>
                <p class="text-slate-500">Gestión de actividades y flujo de trabajo semanal</p>
            </div>
            
            <div class="flex items-center bg-white p-2 rounded-2xl shadow-sm border">
                <button onclick="cambiarMes(-1)" class="p-2 hover:bg-slate-100 rounded-xl transition"><i class="fas fa-chevron-left"></i></button>
                <span id="mes-actual" class="px-6 font-bold text-lg min-w-[150px] text-center">Abril 2024</span>
                <button onclick="cambiarMes(1)" class="p-2 hover:bg-slate-100 rounded-xl transition"><i class="fas fa-chevron-right"></i></button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            
            <aside class="lg:col-span-1 space-y-6">
                <div class="month-card p-6 border border-blue-100 bg-blue-50/30">
                    <h3 class="font-bold mb-4 flex items-center gap-2"><i class="fas fa-plus-circle text-blue-600"></i> Nueva Actividad</h3>
                    <div class="space-y-4">
                        <input type="text" id="task-name" placeholder="Nombre de la tarea..." class="w-full p-3 rounded-xl border-none ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-blue-500">
                        
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase">Semana del mes</label>
                            <select id="task-week" class="w-full p-3 mt-1 rounded-xl border-none ring-1 ring-slate-200 outline-none">
                                <option value="1">Semana 1</option>
                                <option value="2">Semana 2</option>
                                <option value="3">Semana 3</option>
                                <option value="4">Semana 4</option>
                                <option value="5">Semana 5</option>
                            </select>
                        </div>
                        
                        <button onclick="crearTarea()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-200 hover:bg-blue-700 transition">
                            Asignar Actividad
                        </button>
                    </div>
                </div>

                <div class="month-card p-6">
                    <h3 class="font-bold mb-2">Progreso del Mes</h3>
                    <div class="text-4xl font-black text-blue-600 mb-2" id="mes-pct">0%</div>
                    <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                        <div id="mes-bar" class="h-full bg-blue-600 transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </aside>

            <section class="lg:col-span-3 space-y-8" id="contenedor-semanas">
                </section>
        </div>
    </div>

    <script>
        let fechaVisual = new Date(); // Fecha que el usuario está viendo
        let db = JSON.parse(localStorage.getItem('planificador_db')) || [];

        function cambiarMes(delta) {
            fechaVisual.setMonth(fechaVisual.getMonth() + delta);
            render();
        }

        function crearTarea() {
            const nombre = document.getElementById('task-name');
            const semana = document.getElementById('task-week');
            
            if (!nombre.value) return;

            const nuevaTarea = {
                id: Date.now(),
                nombre: nombre.value,
                semana: parseInt(semana.value),
                mes: fechaVisual.getMonth(),
                anio: fechaVisual.getFullYear(),
                progreso: 0 // De 0 a 100
            };

            db.push(nuevaTarea);
            nombre.value = "";
            guardarYRender();
        }

        function actualizarProgreso(id, valor) {
            db = db.map(t => t.id === id ? {...t, progreso: parseInt(valor)} : t);
            guardarYRender();
        }

        function eliminarTarea(id) {
            db = db.filter(t => t.id !== id);
            guardarYRender();
        }

        function guardarYRender() {
            localStorage.setItem('planificador_db', JSON.stringify(db));
            render();
        }

        function render() {
            // Actualizar Texto del Mes
            const opcionesMes = { month: 'long', year: 'numeric' };
            document.getElementById('mes-actual').innerText = fechaVisual.toLocaleDateString('es-ES', opcionesMes).toUpperCase();

            const contenedor = document.getElementById('contenedor-semanas');
            contenedor.innerHTML = "";

            // Filtrar tareas del mes y año actual
            const tareasMes = db.filter(t => t.mes === fechaVisual.getMonth() && t.anio === fechaVisual.getFullYear());

            // Generar 5 semanas
            for (let i = 1; i <= 5; i++) {
                const tareasSemana = tareasMes.filter(t => t.semana === i);
                
                const semanaDiv = document.createElement('div');
                semanaDiv.className = "week-section";
                semanaDiv.innerHTML = `
                    <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-4 font-mono">SEMANA 0${i}</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${tareasSemana.length > 0 ? tareasSemana.map(t => `
                            <div class="month-card p-5 border border-slate-100 hover:border-blue-200 transition">
                                <div class="flex justify-between items-start mb-4">
                                    <h4 class="font-bold text-slate-800">${t.nombre}</h4>
                                    <button onclick="eliminarTarea(${t.id})" class="text-slate-300 hover:text-red-500"><i class="fas fa-times"></i></button>
                                </div>
                                
                                <div class="flex items-center gap-4">
                                    <div class="flex-1 bg-slate-100 h-2 rounded-full overflow-hidden">
                                        <div class="progress-ring h-full bg-blue-500" style="width: ${t.progreso}%"></div>
                                    </div>
                                    <span class="text-xs font-bold mono w-8">${t.progreso}%</span>
                                </div>
                                
                                <input type="range" min="0" max="100" value="${t.progreso}" 
                                    oninput="actualizarProgreso(${t.id}, this.value)"
                                    class="w-full mt-4 h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                            </div>
                        `).join('') : '<p class="text-slate-300 text-sm italic">Sin actividades asignadas</p>'}
                    </div>
                `;
                contenedor.appendChild(semanaDiv);
            }

            // Calcular progreso total del mes
            const totalProgreso = tareasMes.reduce((acc, t) => acc + t.progreso, 0);
            const pctMes = tareasMes.length ? Math.round(totalProgreso / tareasMes.length) : 0;
            
            document.getElementById('mes-pct').innerText = pctMes + "%";
            document.getElementById('mes-bar').style.width = pctMes + "%";
        }

        // Carga inicial
        render();
    </script>
</body>
</html>
