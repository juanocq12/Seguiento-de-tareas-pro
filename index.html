<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClickMaster 4.0 | Sub-Task System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f7f8f9; color: #2d333a; }
        .sidebar { background-color: #2a2e34; color: #a0a6ad; }
        .card { background: white; border: 1px solid #e1e4e8; border-radius: 16px; transition: 0.2s; }
        .subtask-item { border-bottom: 1px solid #f0f0f0; transition: 0.2s; }
        .subtask-item:hover { background: #f9fafb; }
        .progress-fill { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .active-user { background: #3b3f46; color: white; border-left: 4px solid #7b68ee; }
        input[type="checkbox"] { width: 18px; height: 18px; accent-color: #7b68ee; cursor: pointer; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-72 sidebar flex flex-col h-screen shrink-0">
        <div class="p-6 border-b border-gray-700 flex items-center gap-3">
            <div class="bg-purple-600 p-2 rounded-lg rotate-3 shadow-lg"><i class="fas fa-project-diagram text-white"></i></div>
            <span class="font-bold text-white text-lg tracking-tight">TEAM FLOW</span>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Panel de Control</p>
            <button onclick="cambiarVista('global')" id="btn-global" class="w-full text-left p-3 rounded-xl flex items-center gap-3 active-user">
                <i class="fas fa-th-large"></i> Visión Global
            </button>
            
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-6">Miembros del Equipo</p>
            <div id="team-list" class="space-y-1"></div>
        </div>

        <div class="p-4 bg-[#1e2227] border-t border-gray-700">
            <button onclick="enviarRecordatorios()" class="w-full bg-yellow-500/10 text-yellow-500 border border-yellow-500/20 py-2 rounded-lg text-xs font-bold hover:bg-yellow-500 hover:text-white transition mb-4">
                <i class="fas fa-bell mr-1"></i> ENVIAR RECORDATORIOS
            </button>
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-purple-500 rounded-full flex items-center justify-center font-bold text-white text-xs">A</div>
                <div class="flex-1 truncate"><p class="text-xs font-bold text-white">Admin Workspace</p></div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8 z-10">
            <h1 class="font-black text-xl text-slate-700" id="view-title">Dashboard Global</h1>
            <div class="flex items-center gap-4">
                <div class="flex items-center bg-gray-100 rounded-lg p-1">
                    <button onclick="cambiarMes(-1)" class="p-1 px-3 hover:text-purple-600 font-bold"><</button>
                    <span id="label-mes" class="text-xs font-bold uppercase w-28 text-center text-slate-600">Abril 2026</span>
                    <button onclick="cambiarMes(1)" class="p-1 px-3 hover:text-purple-600 font-bold">></button>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
            <div class="max-w-6xl mx-auto mb-10 bg-white p-6 rounded-2xl border-2 border-purple-50 shadow-sm">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <div class="md:col-span-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Actividad Principal</label>
                        <input type="text" id="task-text" placeholder="Ej: Lanzamiento Campaña Q2" class="w-full mt-1 p-2 border-b-2 border-slate-100 outline-none focus:border-purple-500 font-semibold text-lg">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Responsable</label>
                        <select id="task-assignee" class="w-full mt-1 p-2 bg-slate-50 border rounded-xl text-sm font-bold"></select>
                    </div>
                </div>
                
                <div id="subtasks-input-container" class="space-y-2 mb-4">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Etapas de finalización (Escribe y presiona Enter)</label>
                    <div class="flex gap-2">
                        <input type="text" id="subtask-temp" placeholder="Añadir paso o etapa..." class="flex-1 p-2 bg-slate-50 rounded-lg text-sm outline-none focus:ring-1 focus:ring-purple-400">
                        <button onclick="addSubtaskToDraft()" class="bg-slate-200 px-4 rounded-lg text-xs font-bold text-slate-600">AÑADIR PASO</button>
                    </div>
                    <div id="draft-subtasks" class="flex flex-wrap gap-2 mt-2"></div>
                </div>

                <div class="flex justify-between items-center border-t pt-4">
                    <select id="task-week" class="bg-slate-50 border rounded-lg text-xs font-bold p-2">
                        <option value="1">Semana 1</option><option value="2">Semana 2</option>
                        <option value="3">Semana 3</option><option value="4">Semana 4</option>
                    </select>
                    <button onclick="saveFullTask()" class="bg-[#7b68ee] text-white px-10 py-3 rounded-xl font-bold shadow-lg shadow-purple-500/30 hover:scale-105 transition">CREAR PROYECTO</button>
                </div>
            </div>

            <div id="content-container" class="max-w-6xl mx-auto space-y-12"></div>
        </div>
    </main>

    <script>
        const equipo = [
            { id: 1, nombre: "Carlos Ruiz", email: "cruiz@mail.com" },
            { id: 2, nombre: "Elena Gómez", email: "egomez@mail.com" },
            { id: 3, nombre: "Marcos Sosa", email: "msosa@mail.com" }
        ];

        let vistaActual = "global";
        let fechaVer = new Date();
        let tareas = JSON.parse(localStorage.getItem('cm_final_db')) || [];
        let draftSubtasks = [];

        function addSubtaskToDraft() {
            const input = document.getElementById('subtask-temp');
            if(!input.value) return;
            draftSubtasks.push(input.value);
            renderDrafts();
            input.value = "";
        }

        function renderDrafts() {
            const container = document.getElementById('draft-subtasks');
            container.innerHTML = draftSubtasks.map((s, i) => `
                <span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-[10px] font-bold flex items-center gap-2">
                    ${s} <i class="fas fa-times cursor-pointer" onclick="draftSubtasks.splice(${i},1);renderDrafts()"></i>
                </span>
            `).join('');
        }

        function saveFullTask() {
            const text = document.getElementById('task-text').value;
            const user = document.getElementById('task-assignee').value;
            const week = document.getElementById('task-week').value;
            if(!text || draftSubtasks.length === 0) return alert("Añade un nombre y al menos una etapa");

            tareas.push({
                id: Date.now(),
                texto: text,
                responsableId: parseInt(user),
                semana: parseInt(week),
                mes: fechaVer.getMonth(),
                anio: fechaVer.getFullYear(),
                subtasks: draftSubtasks.map(s => ({ texto: s, completed: false }))
            });
            
            draftSubtasks = [];
            document.getElementById('task-text').value = "";
            renderDrafts();
            save();
        }

        function toggleSubtask(taskId, subIndex) {
            const task = tareas.find(t => t.id === taskId);
            task.subtasks[subIndex].completed = !task.subtasks[subIndex].completed;
            save();
        }

        function save() {
            localStorage.setItem('cm_final_db', JSON.stringify(tareas));
            render();
        }

        function cambiarVista(id) {
            vistaActual = id;
            document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active-user'));
            if(id === 'global') {
                document.getElementById('btn-global').classList.add('active-link');
                document.getElementById('view-title').innerText = "Dashboard Global";
            } else {
                document.getElementById(`btn-user-${id}`).classList.add('active-user');
                document.getElementById('view-title').innerText = `Perfil de ${equipo.find(u=>u.id===id).nombre}`;
            }
            render();
        }

        function render() {
            const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            document.getElementById('label-mes').innerText = `${months[fechaVer.getMonth()]} ${fechaVer.getFullYear()}`;
            
            // Cargar select de equipo
            const select = document.getElementById('task-assignee');
            if(select.options.length === 0) equipo.forEach(p => select.innerHTML += `<option value="${p.id}">${p.nombre}</option>`);

            // Cargar lista equipo sidebar
            const tList = document.getElementById('team-list');
            if(tList.innerHTML === "") equipo.forEach(p => tList.innerHTML += `
                <button onclick="cambiarVista(${p.id})" id="btn-user-${p.id}" class="w-full text-left p-3 rounded-xl flex items-center gap-3 transition text-sm">
                    <div class="w-6 h-6 bg-slate-600 rounded-full flex items-center justify-center text-[10px] text-white font-bold">${p.nombre[0]}</div>
                    ${p.nombre}
                </button>`);

            const container = document.getElementById('content-container');
            container.innerHTML = "";

            let filtradas = tareas.filter(t => t.mes === fechaVer.getMonth() && t.anio === fechaVer.getFullYear());
            if(vistaActual !== 'global') filtradas = filtradas.filter(t => t.responsableId === vistaActual);

            for(let w=1; w<=4; w++) {
                const weekTasks = filtradas.filter(t => t.semana === w);
                const section = document.createElement('div');
                section.innerHTML = `
                    <div class="flex items-center gap-3 mb-6">
                        <span class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Semana 0${w}</span>
                        <div class="h-[1px] flex-1 bg-slate-200"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        ${weekTasks.map(t => {
                            const completedCount = t.subtasks.filter(s => s.completed).length;
                            const pct = Math.round((completedCount / t.subtasks.length) * 100);
                            const p = equipo.find(u => u.id === t.responsableId);
                            return `
                            <div class="card overflow-hidden flex flex-col">
                                <div class="p-6 flex-1">
                                    <div class="flex justify-between items-start mb-4">
                                        <div class="bg-purple-50 text-purple-600 text-[10px] font-bold px-3 py-1 rounded-full">${pct === 100 ? 'COMPLETADO' : 'EN PROCESO'}</div>
                                        <button onclick="deleteTask(${t.id})" class="text-slate-300 hover:text-red-500 transition"><i class="fas fa-trash text-xs"></i></button>
                                    </div>
                                    <h3 class="text-lg font-bold text-slate-800 mb-1">${t.texto}</h3>
                                    <div class="flex items-center gap-2 mb-6">
                                        <div class="w-5 h-5 bg-slate-800 rounded-full flex items-center justify-center text-white text-[8px] font-bold">${p.nombre[0]}</div>
                                        <span class="text-[10px] font-semibold text-slate-500">${p.nombre}</span>
                                    </div>
                                    <div class="space-y-1">
                                        ${t.subtasks.map((s, i) => `
                                            <div class="flex items-center gap-3 p-3 subtask-item rounded-lg">
                                                <input type="checkbox" ${s.completed ? 'checked' : ''} onchange="toggleSubtask(${t.id}, ${i})">
                                                <span class="text-sm ${s.completed ? 'text-slate-300 line-through' : 'text-slate-600 font-medium'}">${s.texto}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                                <div class="bg-slate-50 p-4 border-t">
                                    <div class="flex justify-between text-[11px] font-bold mb-2">
                                        <span class="text-slate-400 italic">Progreso del proyecto</span>
                                        <span class="text-purple-600">${pct}%</span>
                                    </div>
                                    <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                                        <div class="progress-fill h-full bg-purple-500" style="width: ${pct}%"></div>
                                    </div>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                `;
                if(weekTasks.length > 0) container.appendChild(section);
            }
        }

        function deleteTask(id) {
            if(confirm('¿Eliminar este proyecto?')) {
                tareas = tareas.filter(t => t.id !== id);
                save();
            }
        }

        function cambiarMes(d) { fechaVer.setMonth(fechaVer.getMonth() + d); render(); }

        window.onload = () => render();
    </script>
</body>
</html>
