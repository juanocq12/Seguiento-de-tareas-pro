<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Master OS | Platinum v9.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root { --primary: #4f46e5; --dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: var(--dark); overflow: hidden; }
        
        .sidebar { background: var(--dark); }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 20px; transition: all 0.3s ease; }
        .btn-active { background: #1e293b; border-left: 4px solid #4f46e5; color: white; }

        /* ESTILOS DE IMPRESIÓN PDF */
        @media print {
            @page { size: portrait; margin: 1cm; }
            .no-print, aside, header, button, .filter-bar { display: none !important; }
            body { background: white !important; overflow: visible !important; }
            main { height: auto !important; overflow: visible !important; padding: 0 !important; }
            .print-only { display: block !important; }
            .report-header { border-bottom: 3px solid #000; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
            .glass-card { border: 1px solid #eee !important; box-shadow: none !important; break-inside: avoid; margin-bottom: 15px !important; }
            .progress-fill { border: 1px solid #4f46e5 !important; }
        }

        .modal { background: rgba(2, 6, 23, 0.7); backdrop-filter: blur(8px); display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="w-72 sidebar flex flex-col h-screen shrink-0 text-slate-400 no-print">
        <div class="p-8 border-b border-slate-800 flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white"><i class="fas fa-file-contract"></i></div>
            <span class="font-bold text-white text-lg tracking-tight">MASTER OS</span>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar">
            <button onclick="cambiarVista('global')" id="nav-global" class="w-full text-left p-4 rounded-xl flex items-center gap-3 hover:text-white transition btn-active">
                <i class="fas fa-th-large"></i> Dashboard Central
            </button>
            <p class="px-4 text-[10px] font-black text-slate-600 uppercase tracking-widest mt-8 mb-4">Reportes por Persona</p>
            <div id="sidebar-team-list" class="space-y-1"></div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden bg-slate-50 relative">
        <div class="hidden print-only report-header">
            <div>
                <h1 class="text-2xl font-black uppercase">Informe de Seguimiento de Actividades</h1>
                <p class="text-xs font-bold text-slate-500">Documento de control interno | Horario: 7AM - 6PM</p>
            </div>
            <div class="text-right">
                <p id="print-date" class="text-xs font-bold"></p>
                <p class="text-[10px] text-slate-400">ID-MASTER-REPORT-2026</p>
            </div>
        </div>

        <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-10 shrink-0 no-print">
            <h1 class="font-black text-xl text-slate-800" id="header-title">Dashboard Global</h1>
            <div class="flex gap-4">
                <button onclick="abrirModalTarea()" class="bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg hover:bg-indigo-700 transition">+ Crear Tarea</button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-10 custom-scrollbar" id="main-render"></div>
    </main>

    <div id="modal-retraso" class="modal no-print">
        <div class="glass-card p-8 w-full max-w-md">
            <h3 class="text-xl font-black text-slate-800 mb-2">Justificación Requerida</h3>
            <p class="text-xs text-slate-400 font-bold mb-6">Tarea vencida: Describe por qué hay un retraso.</p>
            <textarea id="retraso-text" class="w-full p-4 bg-red-50 border border-red-100 rounded-xl h-32 outline-none font-medium" placeholder="Ej: Falta de aprobación de gerencia..."></textarea>
            <div class="flex gap-3 mt-6">
                <button onclick="guardarRetraso()" class="w-full p-4 bg-indigo-600 text-white rounded-xl font-black">REGISTRAR MOTIVO</button>
            </div>
        </div>
    </div>

    <script>
        // DATA INICIAL: 10 TAREAS POR PERSONA (AUTONOMÍA GEMINI)
        let equipo = JSON.parse(localStorage.getItem('v9_team')) || [
            { id: 1, nombre: "Carlos Ruiz", cargo: "Jefe de Operaciones" },
            { id: 2, nombre: "Elena Gómez", cargo: "Líder de Proyectos" }
        ];

        let tareas = JSON.parse(localStorage.getItem('v9_tasks')) || [];

        // Generar las 20 tareas si no existen
        if(tareas.length === 0) {
            const tempTasks = [];
            const nombresCarlos = ["Auditoría Mensual", "Cierre Contable", "Mantenimiento Servidores", "Reunión KPI", "Pago Proveedores", "Inventario Q1", "Revisión Logística", "Capacitación Staff", "Reporte de Riesgos", "Optimización Procesos"];
            const nombresElena = ["Diseño App", "User Testing", "Branding Corporativo", "Wireframes Mobile", "Presentación Cliente", "Corrección Errores", "Lanzamiento Landing", "Entrevistas RRHH", "Plan de Marketing", "Auditoría SEO"];

            for(let i=0; i<10; i++) {
                tempTasks.push({
                    id: 100+i, texto: nombresCarlos[i], userId: 1, creada: "2026-04-10", deadline: "2026-04-15", retraso: i>7 ? "Falta de datos" : "",
                    subtasks: [{texto: "Fase 1", completed: true}, {texto: "Fase 2", completed: i<5}, {texto: "Entrega Final", completed: false}]
                });
                tempTasks.push({
                    id: 200+i, texto: nombresElena[i], userId: 2, creada: "2026-04-12", deadline: "2026-04-20", retraso: "",
                    subtasks: [{texto: "Investigación", completed: true}, {texto: "Prototipado", completed: i<3}, {texto: "Feedback", completed: false}]
                });
            }
            tareas = tempTasks;
            localStorage.setItem('v9_tasks', JSON.stringify(tareas));
        }

        let vistaActual = 'global';
        let currentRetrasoId = null;

        function init() {
            actualizarSidebar();
            render();
            document.getElementById('print-date').innerText = new Date().toLocaleString();
        }

        function render() {
            const container = document.getElementById('main-render');
            if(vistaActual === 'global') renderGlobal(container);
            else if(vistaActual.startsWith('rep-')) renderInformeIndividual(container, vistaActual.split('-')[1]);
        }

        function renderGlobal(container) {
            document.getElementById('header-title').innerText = "Dashboard Global de Actividades";
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${tareas.map(t => cardTarea(t)).join('')}
                </div>
            `;
        }

        function renderInformeIndividual(container, userId) {
            const user = equipo.find(u => u.id == userId);
            const filtradas = tareas.filter(t => t.userId == userId);
            const eficienca = Math.round((filtradas.reduce((acc, t) => acc + (t.subtasks.filter(s=>s.completed).length/t.subtasks.length), 0) / filtradas.length) * 100);

            document.getElementById('header-title').innerText = `Informe: ${user.nombre}`;

            container.innerHTML = `
                <div class="max-w-5xl mx-auto">
                    <div class="glass-card p-10 mb-8 bg-slate-900 text-white border-none shadow-2xl">
                        <div class="flex justify-between items-center mb-6">
                            <div>
                                <h2 class="text-3xl font-black">${user.nombre}</h2>
                                <p class="text-indigo-400 font-bold uppercase tracking-widest text-[10px]">${user.cargo}</p>
                            </div>
                            <button onclick="window.print()" class="no-print bg-indigo-600 px-6 py-2 rounded-xl font-bold text-xs hover:bg-indigo-500 transition">DESCARGAR PDF</button>
                        </div>
                        <div class="grid grid-cols-3 gap-4 border-t border-slate-800 pt-6">
                            <div class="text-center"><p class="text-[10px] opacity-50 uppercase">Eficiencia</p><p class="text-2xl font-black">${eficienca}%</p></div>
                            <div class="text-center"><p class="text-[10px] opacity-50 uppercase">Tareas Totales</p><p class="text-2xl font-black">${filtradas.length}</p></div>
                            <div class="text-center"><p class="text-[10px] opacity-50 uppercase">En Retraso</p><p class="text-2xl font-black text-red-400">${filtradas.filter(t => isVencida(t) && t.retraso).length}</p></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 gap-4">
                        ${filtradas.map(t => cardTarea(t, true)).join('')}
                    </div>

                    <div class="hidden print-only mt-20 flex justify-between px-10">
                        <div class="text-center border-t border-black w-48 pt-2 font-bold text-xs">Firma del Responsable</div>
                        <div class="text-center border-t border-black w-48 pt-2 font-bold text-xs">Firma de Gerencia</div>
                    </div>
                </div>
            `;
        }

        function cardTarea(t, modoInforme = false) {
            const completas = t.subtasks.filter(s => s.completed).length;
            const pct = Math.round((completas / t.subtasks.length) * 100);
            const user = equipo.find(u => u.id === t.userId);
            const vencida = isVencida(t) && pct < 100;

            return `
                <div class="glass-card p-6 ${vencida ? 'border-red-200 bg-red-50/20' : ''}">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h4 class="font-black text-slate-800">${t.texto}</h4>
                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Deadline: ${t.deadline} | Sem ${t.semana}</p>
                        </div>
                        <span class="text-[10px] font-black ${pct === 100 ? 'text-green-600 bg-green-100' : 'text-indigo-600 bg-indigo-50'} px-2 py-1 rounded-md">${pct}%</span>
                    </div>
                    <div class="space-y-2 mb-4">
                        ${t.subtasks.map((s, i) => `
                            <div class="flex items-center gap-2 text-[11px] font-medium">
                                <input type="checkbox" ${s.completed ? 'checked' : ''} onchange="toggleSub(${t.id}, ${i})" class="no-print">
                                <span class="${s.completed ? 'text-slate-300 line-through' : 'text-slate-600'}">${s.texto}</span>
                            </div>
                        `).join('')}
                    </div>
                    ${vencida && !t.retraso ? `
                        <button onclick="pedirRetraso(${t.id})" class="no-print w-full bg-red-600 text-white py-2 rounded-lg text-[10px] font-black uppercase tracking-widest">Registrar Retraso</button>
                    ` : ''}
                    ${t.retraso ? `
                        <div class="mt-4 p-3 bg-white border border-red-100 rounded-xl">
                            <p class="text-[9px] font-black text-red-500 uppercase mb-1">Motivo del Retraso:</p>
                            <p class="text-[10px] font-bold text-slate-700 italic">"${t.retraso}"</p>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        // --- FUNCIONES CORE ---
        function isVencida(t) { return new Date(t.deadline) < new Date(); }

        function pedirRetraso(id) {
            currentRetrasoId = id;
            document.getElementById('modal-retraso').style.display = 'flex';
        }

        function guardarRetraso() {
            const motivo = document.getElementById('retraso-text').value;
            if(!motivo) return alert("Por favor escribe el motivo.");
            const t = tareas.find(x => x.id === currentRetrasoId);
            t.retraso = motivo;
            save();
            document.getElementById('modal-retraso').style.display = 'none';
            document.getElementById('retraso-text').value = "";
        }

        function toggleSub(tId, sIdx) {
            const t = tareas.find(x => x.id == tId);
            t.subtasks[sIdx].completed = !t.subtasks[sIdx].completed;
            save();
        }

        function save() { 
            localStorage.setItem('v9_tasks', JSON.stringify(tareas)); 
            render(); 
        }

        function actualizarSidebar() {
            document.getElementById('sidebar-team-list').innerHTML = equipo.map(p => `
                <button onclick="cambiarVista('rep-${p.id}')" class="w-full text-left p-3 rounded-xl flex items-center gap-3 hover:text-white transition text-sm">
                    <div class="w-2 h-2 rounded-full bg-indigo-500 shadow-lg"></div> ${p.nombre}
                </button>
            `).join('');
        }

        function cambiarVista(v) {
            vistaActual = v;
            render();
        }

        window.onload = init;
    </script>
</body>
</html>
