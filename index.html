<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise OS | Report Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; overflow: hidden; }
        .sidebar { background-color: #020617; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 24px; transition: all 0.3s ease; }
        .btn-active { background: #1e293b; border-left: 4px solid #6366f1; color: white; }
        .progress-bar { transition: width 0.6s ease-in-out; }
        .modal { background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        input[type="checkbox"] { width: 18px; height: 18px; accent-color: #6366f1; cursor: pointer; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="w-72 sidebar flex flex-col h-screen shrink-0 text-slate-400">
        <div class="p-8 flex items-center gap-3 border-b border-slate-800">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-chart-pie"></i></div>
            <span class="font-extrabold text-white text-xl tracking-tight">MASTER HUB</span>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar">
            <p class="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Administración</p>
            <button onclick="cambiarVista('global')" id="nav-global" class="w-full text-left p-4 rounded-xl flex items-center gap-3 hover:text-white transition btn-active">
                <i class="fas fa-home"></i> Inicio Global
            </button>
            <button onclick="cambiarVista('equipo')" id="nav-equipo" class="w-full text-left p-4 rounded-xl flex items-center gap-3 hover:text-white transition">
                <i class="fas fa-users-cog"></i> Gestión Staff
            </button>
            
            <p class="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-8 mb-4">Seguimiento por Persona</p>
            <div id="sidebar-team-list" class="space-y-1"></div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-10 shrink-0">
            <h1 class="font-black text-2xl text-slate-800" id="header-title">Inicio Global</h1>
            <div class="flex items-center gap-4">
                <div class="flex items-center bg-slate-100 rounded-full p-1 border shadow-sm">
                    <button onclick="cambiarMes(-1)" class="w-8 h-8 flex items-center justify-center hover:bg-white rounded-full transition font-bold"><</button>
                    <span id="label-mes" class="px-4 text-[10px] font-black uppercase text-slate-600">Abril 2026</span>
                    <button onclick="cambiarMes(1)" class="w-8 h-8 flex items-center justify-center hover:bg-white rounded-full transition font-bold">></button>
                </div>
                <button onclick="abrirModalTarea()" class="bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition">+ CREAR PROYECTO</button>
            </div>
        </header>

        <div id="filter-bar" class="bg-white border-b px-10 py-3 flex items-center gap-4 hidden animate__animated animate__fadeInDown">
            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Filtrar por:</span>
            <div class="flex bg-slate-100 p-1 rounded-lg">
                <button onclick="setFiltro('dia')" id="f-dia" class="px-4 py-1.5 rounded-md text-[10px] font-bold text-slate-500 transition">Día</button>
                <button onclick="setFiltro('semana')" id="f-semana" class="px-4 py-1.5 rounded-md text-[10px] font-bold text-slate-500 transition">Semana</button>
                <button onclick="setFiltro('mes')" id="f-mes" class="px-4 py-1.5 rounded-md text-[10px] font-bold bg-white text-indigo-600 shadow-sm transition">Mes</button>
            </div>
            <input type="date" id="calendar-input" onchange="render()" class="ml-auto text-xs font-bold p-1.5 border rounded-lg outline-none bg-slate-50 focus:ring-2 focus:ring-indigo-500">
        </div>

        <div class="flex-1 overflow-y-auto p-10 bg-slate-50 custom-scrollbar" id="main-render"></div>
    </main>

    <div id="modal-tarea" class="modal">
        <div class="glass-card p-8 w-full max-w-xl">
            <h3 class="text-xl font-black mb-6 text-slate-800">Definir Nueva Tarea</h3>
            <div class="space-y-4">
                <input type="text" id="t-nombre" placeholder="Nombre de la actividad" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold">
                <div class="grid grid-cols-2 gap-4">
                    <select id="t-resp" class="p-3 bg-slate-50 border rounded-xl text-xs font-bold"></select>
                    <select id="t-sem" class="p-3 bg-slate-50 border rounded-xl text-xs font-bold">
                        <option value="1">Semana 1</option><option value="2">Semana 2</option>
                        <option value="3">Semana 3</option><option value="4">Semana 4</option>
                    </select>
                </div>
                <div class="bg-indigo-50 p-6 rounded-2xl border-2 border-dashed border-indigo-200">
                    <p class="text-[10px] font-black text-indigo-400 mb-3 uppercase tracking-widest">Añadir Etapas (Progress Check)</p>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="sub-input" placeholder="Ej: Entrega de archivos finales" class="flex-1 p-2 rounded-lg border-none shadow-sm text-sm">
                        <button onclick="addEtapaDraft()" class="bg-indigo-600 text-white px-4 rounded-xl font-bold text-xs"><i class="fas fa-plus"></i></button>
                    </div>
                    <div id="etapas-draft" class="flex flex-wrap gap-2"></div>
                </div>
                <div class="flex gap-4 pt-4">
                    <button onclick="cerrarModal('modal-tarea')" class="flex-1 p-3 font-bold text-slate-400">Cancelar</button>
                    <button onclick="guardarTarea()" class="flex-1 p-3 bg-indigo-600 text-white rounded-2xl font-bold">Lanzar Actividad</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-equipo" class="modal">
        <div class="glass-card p-8 w-full max-w-md">
            <h3 class="text-xl font-black mb-6">Nuevo Integrante</h3>
            <div class="space-y-4">
                <input type="text" id="p-nom" placeholder="Nombre Completo" class="w-full p-3 border rounded-xl outline-none font-bold">
                <input type="text" id="p-car" placeholder="Cargo" class="w-full p-3 border rounded-xl outline-none">
                <input type="email" id="p-ema" placeholder="Email de contacto" class="w-full p-3 border rounded-xl outline-none">
                <button onclick="guardarPersonal()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold shadow-lg">Registrar</button>
                <button onclick="cerrarModal('modal-equipo')" class="w-full p-2 text-xs font-bold text-slate-400">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // DB Y ESTADO
        let equipo = JSON.parse(localStorage.getItem('v7_team')) || [
            { id: 1, nombre: "Carlos Ruiz", cargo: "Senior Dev", email: "carlos@corp.com" },
            { id: 2, nombre: "Elena Gómez", cargo: "Diseñadora", email: "elena@corp.com" }
        ];
        let tareas = JSON.parse(localStorage.getItem('v7_tasks')) || [];
        let draftEtapas = [];
        let vistaActual = 'global';
        let filtroT = 'mes'; // dia, semana, mes
        let mesRef = new Date();

        function init() {
            document.getElementById('calendar-input').valueAsDate = new Date();
            actualizarSidebar();
            render();
        }

        function actualizarSidebar() {
            const list = document.getElementById('sidebar-team-list');
            list.innerHTML = equipo.map(p => `
                <button onclick="cambiarVista('rep-${p.id}')" class="w-full text-left p-3 rounded-xl flex items-center gap-3 hover:text-white transition text-sm">
                    <div class="w-6 h-6 bg-slate-800 rounded-lg flex items-center justify-center text-[10px] font-bold text-indigo-400">${p.nombre[0]}</div>
                    ${p.nombre}
                </button>
            `).join('');
        }

        function cambiarVista(v) {
            vistaActual = v;
            document.getElementById('filter-bar').classList.toggle('hidden', !v.startsWith('rep-'));
            render();
        }

        function render() {
            const container = document.getElementById('main-render');
            const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            document.getElementById('label-mes').innerText = `${meses[mesRef.getMonth()]} ${mesRef.getFullYear()}`;

            if(vistaActual === 'global') renderGlobal(container);
            else if(vistaActual === 'equipo') renderGestionEquipo(container);
            else if(vistaActual.startsWith('rep-')) renderInformeIndividual(container, vistaActual.split('-')[1]);
        }

        // --- DASHBOARD INDIVIDUAL CON FILTROS ---
        function renderInformeIndividual(container, userId) {
            const user = equipo.find(u => u.id == userId);
            const fechaSelec = new Date(document.getElementById('calendar-input').value);
            let filtradas = tareas.filter(t => t.userId == userId);

            // LOGICA DE FILTRADO
            if(filtroT === 'mes') {
                filtradas = filtradas.filter(t => t.mes === mesRef.getMonth() && t.anio === mesRef.getFullYear());
            } else if(filtroT === 'dia') {
                const fStr = fechaSelec.toISOString().split('T')[0];
                filtradas = filtradas.filter(t => t.creada === fStr);
            } else if(filtroT === 'semana') {
                const semSelec = Math.ceil(fechaSelec.getDate() / 7);
                filtradas = filtradas.filter(t => t.semana == semSelec && t.mes === fechaSelec.getMonth());
            }

            document.getElementById('header-title').innerText = `Seguimiento: ${user.nombre}`;
            
            container.innerHTML = `
                <div class="max-w-5xl mx-auto space-y-6">
                    <div class="glass-card p-8 flex justify-between items-center bg-white border-b-8 border-indigo-600 shadow-xl">
                        <div>
                            <h2 class="text-2xl font-black">${user.nombre}</h2>
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">${user.cargo} • Período: ${filtroT.toUpperCase()}</p>
                        </div>
                        <button onclick="enviarInforme(${userId})" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-black text-[10px] flex items-center gap-2 hover:scale-105 transition">
                            <i class="fas fa-paper-plane"></i> ENVIAR INFORME A JEFE
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        ${filtradas.length ? filtradas.map(t => cardTarea(t)).join('') : `<div class="col-span-2 p-20 text-center glass-card border-dashed border-2 text-slate-400 font-bold">No hay tareas registradas en este período.</div>`}
                    </div>
                </div>
            `;
        }

        // --- EXPORTACIÓN DE INFORME ---
        function enviarInforme(userId) {
            const user = equipo.find(u => u.id == userId);
            const fecha = new Date(document.getElementById('calendar-input').value);
            let filtradas = tareas.filter(t => t.userId == userId);

            if(filtroT==='mes') filtradas = filtradas.filter(t => t.mes === mesRef.getMonth());
            if(filtroT==='dia') filtradas = filtradas.filter(t => t.creada === fecha.toISOString().split('T')[0]);

            let reporte = `📋 REPORTE DE ACTUALIZACIÓN - ${user.nombre.toUpperCase()}\n`;
            reporte += `📅 Fecha: ${fecha.toLocaleDateString()} | Modo: ${filtroT.toUpperCase()}\n`;
            reporte += `-------------------------------------------\n\n`;

            filtradas.forEach(t => {
                const pct = Math.round((t.subtasks.filter(s=>s.completed).length / t.subtasks.length) * 100);
                reporte += `📌 ${t.texto} [${pct}%]\n`;
                t.subtasks.forEach(s => {
                    reporte += `   ${s.completed ? '✅' : '⏳'} ${s.texto}\n`;
                });
                reporte += `\n`;
            });

            reporte += `-------------------------------------------\nReporte generado por Enterprise Hub.`;
            
            navigator.clipboard.writeText(reporte);
            alert("¡Informe generado y copiado al portapapeles! Listo para enviar por WhatsApp o Email.");
        }

        // --- COMPONENTES ---
        function cardTarea(t) {
            const completas = t.subtasks.filter(s => s.completed).length;
            const pct = Math.round((completas / t.subtasks.length) * 100);
            return `
                <div class="glass-card p-6 border-l-4 ${pct === 100 ? 'border-green-500' : 'border-indigo-500'}">
                    <div class="flex justify-between items-start mb-4">
                        <h4 class="font-black text-slate-800 leading-tight">${t.texto}</h4>
                        <span class="text-[10px] font-black text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">${pct}%</span>
                    </div>
                    <div class="space-y-2 mb-4">
                        ${t.subtasks.map((s, i) => `
                            <div class="flex items-center gap-3 p-2 bg-slate-50 rounded-xl text-[11px]">
                                <input type="checkbox" ${s.completed ? 'checked' : ''} onchange="toggleSub(${t.id}, ${i})">
                                <span class="${s.completed ? 'text-slate-300 line-through' : 'text-slate-700 font-bold'}">${s.texto}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="pt-3 border-t flex justify-between text-[9px] font-bold text-slate-400 uppercase tracking-tighter">
                        <span>Creada: ${t.creada}</span>
                        <span>Semana ${t.semana}</span>
                    </div>
                </div>
            `;
        }

        // --- LOGICA CORE ---
        function setFiltro(f) {
            filtroT = f;
            document.querySelectorAll('#filter-bar button').forEach(b => {
                b.className = "px-4 py-1.5 rounded-md text-[10px] font-bold text-slate-500 transition";
            });
            document.getElementById(`f-${f}`).className = "px-4 py-1.5 rounded-md text-[10px] font-bold bg-white text-indigo-600 shadow-sm transition";
            render();
        }

        function guardarTarea() {
            const t = {
                id: Date.now(),
                texto: document.getElementById('t-nombre').value,
                userId: parseInt(document.getElementById('t-resp').value),
                semana: parseInt(document.getElementById('t-sem').value),
                mes: mesRef.getMonth(),
                anio: mesRef.getFullYear(),
                creada: new Date().toISOString().split('T')[0],
                subtasks: draftEtapas.map(s => ({ texto: s, completed: false }))
            };
            if(!t.texto || !draftEtapas.length) return alert("Faltan datos");
            tareas.push(t);
            save();
            cerrarModal('modal-tarea');
        }

        function guardarPersonal() {
            const p = { id: Date.now(), nombre: document.getElementById('p-nom').value, cargo: document.getElementById('p-car').value, email: document.getElementById('p-ema').value };
            equipo.push(p);
            save();
            actualizarSidebar();
            cerrarModal('modal-equipo');
        }

        function renderGlobal(container) {
            document.getElementById('header-title').innerText = "Inicio Global";
            const delMes = tareas.filter(t => t.mes === mesRef.getMonth());
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                    <div class="glass-card p-6 bg-white border-l-4 border-indigo-600">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Tareas Mes</p>
                        <h4 class="text-3xl font-black">${delMes.length}</h4>
                    </div>
                    <div class="glass-card p-6 bg-white border-l-4 border-green-500">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Staff</p>
                        <h4 class="text-3xl font-black">${equipo.length}</h4>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    ${delMes.map(t => cardTarea(t)).join('')}
                </div>
            `;
        }

        function renderGestionEquipo(container) {
            document.getElementById('header-title').innerText = "Gestión de Staff";
            container.innerHTML = `
                <div class="glass-card overflow-hidden">
                    <div class="p-6 border-b flex justify-between items-center">
                        <h3 class="font-black">Lista de Personal</h3>
                        <button onclick="document.getElementById('modal-equipo').style.display='flex'" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold">AÑADIR</button>
                    </div>
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase">
                            <tr><th class="p-6">Nombre</th><th class="p-6">Cargo</th><th class="p-6">Acción</th></tr>
                        </thead>
                        <tbody>
                            ${equipo.map(p => `
                                <tr class="border-b hover:bg-slate-50 transition">
                                    <td class="p-6 font-bold text-slate-700">${p.nombre}</td>
                                    <td class="p-6 text-slate-400">${p.cargo}</td>
                                    <td class="p-6"><button onclick="eliminarP(${p.id})" class="text-red-400"><i class="fas fa-trash"></i></button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function toggleSub(tId, sIdx) {
            const t = tareas.find(x => x.id == tId);
            t.subtasks[sIdx].completed = !t.subtasks[sIdx].completed;
            save();
        }

        function addEtapaDraft() {
            const val = document.getElementById('sub-input').value;
            if(!val) return;
            draftEtapas.push(val);
            document.getElementById('sub-input').value = "";
            renderDrafts();
        }

        function renderDrafts() {
            document.getElementById('etapas-draft').innerHTML = draftEtapas.map(s => `<span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-lg text-[10px] font-black">${s}</span>`).join('');
        }

        function abrirModalTarea() {
            document.getElementById('modal-tarea').style.display='flex';
            document.getElementById('t-resp').innerHTML = equipo.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
            draftEtapas = [];
            renderDrafts();
        }

        function save() { localStorage.setItem('v7_team', JSON.stringify(equipo)); localStorage.setItem('v7_tasks', JSON.stringify(tareas)); render(); }
        function cerrarModal(id) { document.getElementById(id).style.display='none'; }
        function cambiarMes(d) { mesRef.setMonth(mesRef.getMonth() + d); render(); }
        function eliminarP(id) { if(confirm("¿Eliminar?")) { equipo = equipo.filter(x => x.id != id); save(); actualizarSidebar(); } }

        window.onload = init;
    </script>
</body>
</html>
