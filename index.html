<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acta de Entrega Digital - IPS Interconsultas</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; }
    
    .header { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); padding: 40px 20px; text-align: center; border-bottom: 1px solid #334155; }
    .header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; color: white; }
    
    .stats { display: flex; justify-content: center; gap: 20px; margin-top: 25px; }
    .stat-circle { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #334155; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1e293b; }
    .stat-circle.active { border-color: #0d9488; box-shadow: 0 0 15px rgba(13, 148, 136, 0.3); }
    .stat-num { font-size: 24px; font-weight: 800; color: white; }
    .stat-label { font-size: 10px; text-transform: uppercase; color: #94a3b8; font-weight: 700; }

    .container { max-width: 700px; margin: 0 auto; padding: 20px; }
    
    .card { background: #1e293b; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; transition: all 0.3s ease; }
    .card:hover { border-color: #475569; }

    .task-row { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; margin-bottom: 4px; background: rgba(15, 23, 42, 0.5); }
    .checkbox { width: 22px; height: 22px; border: 2px solid #475569; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .checkbox.checked { background: #0d9488; border-color: #0d9488; }
    
    .status-badge { display: inline-flex; align-items: center; gap: 6px; background: #064e3b; color: #34d399; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-bottom: 20px; }
    
    .cat-title { font-weight: 700; font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
    .cat-icon { color: #0d9488; }

    .btn-print { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #0d9488; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); cursor: pointer; border: none; z-index: 100; }
    
    @media print { .btn-print, .status-badge { display: none; } body { background: white; color: black; } .card { border: 1px solid #eee; break-inside: avoid; } }
</style>
</head>
<body>

<div class="header">
    <div class="status-badge" id="sync-status">
        <i class="fas fa-sync-alt fa-spin"></i> SINCRONIZANDO NUBE
    </div>
    <h1>Acta de Entrega de Puesto</h1>
    <p style="color: #94a3b8; font-size: 14px; margin-top: 5px;">Área Biomédica y Soporte Técnico</p>
    
    <div class="stats">
        <div class="stat-circle"><div class="stat-num" id="s-total">0</div><div class="stat-label">Tareas</div></div>
        <div class="stat-circle active"><div class="stat-num" id="s-pend">0</div><div class="stat-label">Pendientes</div></div>
        <div class="stat-circle"><div class="stat-num" id="s-pct">0%</div><div class="stat-label">Progreso</div></div>
    </div>
</div>

<div class="container">
    <div class="card" style="border-left: 4px solid #0d9488;">
        <div class="cat-title"><i class="fas fa-user-tie cat-icon"></i> Responsable</div>
        <div style="font-size: 18px; font-weight: 700;">Juan Manuel Correa</div>
        <div style="color: #94a3b8; font-size: 13px;">Soporte Técnico / Biomédico</div>
    </div>

    <div id="categorias-cont">
        </div>
</div>

<button class="btn-print" onclick="window.print()"><i class="fas fa-print"></i></button>

<script>
const DB_URL = "https://acta-ips-interconsultas-default-rtdb.firebaseio.com/acta.json";

const CONFIG = {
    categorias: [
        { id: 'biom', title: 'Gestión Biomédica', icon: 'fa-heartbeat', tasks: ['Cronograma de mantenimientos 2026', 'Hojas de vida actualizadas', 'Inventario de repuestos', 'Certificados de calibración'] },
        { id: 'sop', title: 'Soporte Técnico IT', icon: 'fa-laptop-medical', tasks: ['Revisión de redes y racks', 'Inventario de equipos de cómputo', 'Accesos a servidores', 'Cuentas de correo corporativo'] },
        { id: 'inf', title: 'Infraestructura y Apoyo', icon: 'fa-tools', tasks: ['Planta eléctrica y UPS', 'Sistemas de vacío y aire', 'Ascensores y plataformas', 'Tanques de agua'] }
    ]
};

let appData = { doneTasks: [] };

async function loadData() {
    try {
        const response = await fetch(DB_URL);
        const data = await response.json();
        if (data && data.doneTasks) {
            appData.doneTasks = data.doneTasks;
        }
        render();
        updateSyncStatus('CONECTADO');
    } catch (error) {
        console.error("Error cargando datos:", error);
        updateSyncStatus('MODO LOCAL', true);
    }
}

async function saveData() {
    updateSyncStatus('GUARDANDO...');
    try {
        await fetch(DB_URL, {
            method: 'PUT',
            body: JSON.stringify(appData)
        });
        updateSyncStatus('SINCRONIZADO');
    } catch (error) {
        updateSyncStatus('ERROR AL GUARDAR', true);
    }
}

function toggleTask(taskId) {
    const index = appData.doneTasks.indexOf(taskId);
    if (index > -1) {
        appData.doneTasks.splice(index, 1);
    } else {
        appData.doneTasks.push(taskId);
    }
    render();
    saveData();
}

function updateSyncStatus(text, isError = false) {
    const el = document.getElementById('sync-status');
    el.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${text}`;
    el.style.color = isError ? '#f87171' : '#34d399';
}

function render() {
    const container = document.getElementById('categorias-cont');
    container.innerHTML = '';
    let totalTasks = 0;

    CONFIG.categorias.forEach(cat => {
        let catHtml = `
            <div class="card">
                <div class="cat-title"><i class="fas ${cat.icon} cat-icon"></i> ${cat.title}</div>
                <div>
        `;
        
        cat.tasks.forEach((task, idx) => {
            const taskId = `${cat.id}-${idx}`;
            const isDone = appData.doneTasks.includes(taskId);
            totalTasks++;
            
            catHtml += `
                <div class="task-row" onclick="toggleTask('${taskId}')">
                    <div class="checkbox ${isDone ? 'checked' : ''}">
                        ${isDone ? '<i class="fas fa-check" style="font-size:10px; color:white;"></i>' : ''}
                    </div>
                    <div style="font-size: 14px; ${isDone ? 'text-decoration: line-through; color: #64748b;' : 'color: #f1f5f9;'}">
                        ${task}
                    </div>
                </div>
            `;
        });

        catHtml += `</div></div>`;
        container.innerHTML += catHtml;
    });

    // Actualizar contadores
    const doneCount = appData.doneTasks.length;
    document.getElementById('s-total').innerText = totalTasks;
    document.getElementById('s-pend').innerText = totalTasks - doneCount;
    document.getElementById('s-pct').innerText = Math.round((doneCount / totalTasks) * 100) + '%';
}

// Inicio
loadData();
</script>
</body>
</html>
