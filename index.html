<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClickMaster Pro | Analytics Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .sidebar { background-color: #0f172a; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 24px; }
        .user-active { background: #334155; border-left: 4px solid #8b5cf6; }
        .progress-bar { transition: width 0.8s ease-in-out; }
        .stat-card { transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-72 sidebar flex flex-col h-screen shrink-0 text-slate-400">
        <div class="p-8 flex items-center gap-3 border-b border-slate-800">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-500/20">
                <i class="fas fa-chart-pie text-lg"></i>
            </div>
            <span class="font-extrabold text-white text-xl tracking-tight">ANALYTICS</span>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-6">
            <nav class="space-y-1">
                <p class="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">Principal</p>
                <button onclick="cambiarVista('global')" id="btn-global" class="w-full text-left p-4 rounded-2xl flex items-center gap-3 transition hover:text-white">
                    <i class="fas fa-th-large"></i> Visión General
                </button>
            </nav>

            <nav class="space-y-1">
                <p class="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">Equipo Mensual</p>
                <div id="team-list" class="space-y-1"></div>
            </nav>
        </div>

        <div class="p-6 bg-slate-900/50 border-t border-slate-800">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center font-bold text-white">A</div>
                <div>
                    <p class="text-xs font-bold text-white">Admin Control</p>
                    <p class="text-[10px] text-indigo-400 font-bold uppercase">Super User</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b border-slate-100 flex items-center justify-between px-10 shrink-0">
            <div class="flex items-center gap-4">
                <h1 class="font-extrabold text-2xl text-slate-800" id="header-title">Dashboard Global</h1>
                <div class="flex items-center bg-slate-100 rounded-full p-1 ml-4">
                    <button onclick="cambiarMes(-1)" class="w-8 h-8 flex items-center justify-center hover:bg-white rounded-full transition"><</button>
                    <span id="label-mes" class="px-4 text-xs font-black uppercase text-slate-600">Abril 2026</span>
                    <button onclick="cambiarMes(1)" class="w-8 h-8 flex items-center justify-center hover:bg-white rounded-full transition">></button>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="abrirCreador()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold text-sm shadow-xl shadow-indigo-500/20 hover:bg-indigo-700 transition flex items-center gap-2">
                    <i class="fas fa-plus"></i> NUEVA TAREA
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-10 custom-scrollbar bg-[#f8fafc]" id="main-render">
            </div>
    </main>

    <script>
        // DATOS ESTRUCTURALES
        const equipo = [
            { id: 1, nombre: "Carlos Ruiz", cargo: "Senior Dev", email: "cruiz@tech.com", bio: "Especialista en Backend y Arquitectura." },
            { id: 2, nombre: "Elena Gómez", cargo: "UX Designer", email: "egomez@tech.com", bio: "Enfocada en la experiencia de usuario y accesibilidad." },
            { id: 3, nombre: "Marcos Sosa", cargo: "Marketing", email: "msosa@tech.com", bio: "Estratega de contenidos y growth hacking." }
        ];

        let vistaActual = "global";
        let mesActual = new Date();
        let db = JSON.parse(localStorage.getItem('cm_pro_db')) || [];

        // INICIO
        function init() {
            renderSidebar();
            render();
        }

        function renderSidebar() {
            const list = document.getElementById('team-list');
            list.innerHTML = equipo.map(p => `
                <button onclick="cambiarVista(${p.id})" id="btn-user-${p.id}" class="w-full text-left p-4 rounded-2xl flex items-center gap-3 transition hover:text-white">
                    <div class="w-8 h-8 bg-slate-700 rounded-xl flex items-center justify-center text-[10px] font-bold text-white">${p.nombre[0]}</div>
                    <div>
                        <p class="text-sm font-bold">${p.nombre}</p>
                        <p class="text-[9px] text-slate-500 font-bold uppercase">${p.cargo}</p>
                    </div>
                </button>
            `).join('');
        }

        function cambiarVista(id) {
            vistaActual = id;
            document.querySelectorAll('aside button').forEach(b => b.classList.remove('user-active', 'text-white'));
            if(id === 'global') {
                document.getElementById('btn-global').classList.add('user-active', 'text-white');
            } else {
                document.getElementById(`btn-user-${id}`).classList.add('user-active', 'text-white');
            }
            render();
        }

        function render() {
            const container = document.getElementById('main-render');
            const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            document.getElementById('label-mes').innerText = `${months[mesActual.getMonth()]} ${mesActual.getFullYear()}`;

            if(vistaActual === 'global') {
                renderGlobal(container);
            } else {
                renderUserProfile(container, vistaActual);
            }
        }

        // VISTA 1: DASHBOARD GLOBAL
        function renderGlobal(container) {
            document.getElementById('header-title').innerText = "Dashboard Global";
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    <div class="glass-card p-8 bg-gradient-to-br from-indigo-600 to-violet-700 text-white shadow-2xl shadow-indigo-200">
                        <p class="text-xs font-bold uppercase opacity-80 mb-2 tracking-widest">Total Tareas Mes</p>
                        <h2 class="text-5xl font-black">${db.filter(t => t.mes === mesActual.getMonth()).length}</h2>
                    </div>
                    <div class="glass-card p-8">
                        <p class="text-xs font-bold text-slate-400 uppercase mb-2 tracking-widest">Eficiencia Equipo</p>
                        <h2 class="text-5xl font-black text-slate-800">${calcularEficienciaGlobal()}%</h2>
                    </div>
                </div>
                <div id="global-tasks-render" class="space-y-8">
                    </div>
            `;
            renderTasksByWeek(document.getElementById('global-tasks-render'));
        }

        // VISTA 2: DASHBOARD INDIVIDUAL (LO NUEVO PRO)
        function renderUserProfile(container, userId) {
            const user = equipo.find(u => u.id === userId);
            const userTasks = db.filter(t => t.userId === userId && t.mes === mesActual.getMonth());
            const completadas = userTasks.filter(t => isTaskComplete(t)).length;
            const eficiencia = userTasks.length ? Math.round((completadas / userTasks.length) * 100) : 0;

            document.getElementById('header-title').innerText = `Reporte: ${user.nombre}`;

            container.innerHTML = `
                <div class="max-w-6xl mx-auto space-y-8 animate__animated animate__fadeIn">
                    <div class="glass-card p-10 flex flex-wrap items-center gap-8 bg-white">
                        <div class="w-32 h-32 bg-slate-800 rounded-[40px] flex items-center justify-center text-4xl text-white font-black shadow-2xl">
                            ${user.nombre[0]}
                        </div>
                        <div class="flex-1">
                            <h2 class="text-3xl font-extrabold text-slate-800">${user.nombre}</h2>
                            <p class="text-indigo-600 font-bold uppercase text-xs tracking-[0.2em] mb-4">${user.cargo} • ${user.email}</p>
                            <p class="text-slate-500 text-sm max-w-xl">${user.bio}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-slate-400 uppercase mb-2">Performance Mensual</p>
                            <div class="text-6xl font-black text-slate-800">${eficiencia}%</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="glass-card p-6 stat-card">
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-4">Tareas Totales</p>
                            <p class="text-3xl font-black text-slate-800">${userTasks.length}</p>
                        </div>
                        <div class="glass-card p-6 stat-card">
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-4">Completadas</p>
                            <p class="text-3xl font-black text-green-500">${completadas}</p>
                        </div>
                        <div class="glass-card p-6 stat-card">
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-4">Pendientes</p>
                            <p class="text-3xl font-black text-amber-500">${userTasks.length - completadas}</p>
                        </div>
                        <div class="glass-card p-6 stat-card bg-indigo-50 border-indigo-100">
                            <p class="text-[10px] font-bold text-indigo-400 uppercase mb-4">Estatus</p>
                            <p class="text-xl font-black text-indigo-700">${eficiencia > 80 ? 'EXCELENTE' : (eficiencia > 40 ? 'PRODUCTIVO' : 'BAJO')} 🔥</p>
                        </div>
                    </div>

                    <div class="glass-card p-8">
                        <h3 class="font-bold text-lg mb-6 flex items-center gap-2">
                            <i class="fas fa-list-check text-indigo-500"></i> Seguimiento de Actividades de ${user.nombre.split(' ')[0]}
                        </h3>
                        <div class="space-y-6" id="profile-tasks"></div>
                    </div>
                </div>
            `;
            renderTasksByWeek(document.getElementById('profile-tasks'), userId);
        }

        // FUNCIONES DE SOPORTE
        function renderTasksByWeek(target, userId = null) {
            let filtradas = db.filter(t => t.mes === mesActual.getMonth());
            if(userId) filtradas = filtradas.filter(t => t.userId === userId);

            for(let w=1; w<=4; w++) {
                const weekTasks = filtradas.filter(t => t.semana === w);
                if(weekTasks.length === 0) continue;

                const weekDiv = document.createElement('div');
                weekDiv.className = "mb-8";
                weekDiv.innerHTML = `
                    <div class="flex items-center gap-4 mb-4">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Semana 0${w}</span>
                        <div class="h-[1px] flex-1 bg-slate-100"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${weekTasks.map(t => {
                            const pct = calcularPct(t);
                            const u = equipo.find(user => user.id === t.userId);
                            return `
                                <div class="glass-card p-6 hover:shadow-xl transition-all border-l-4 ${pct === 100 ? 'border-green-500' : 'border-indigo-400'}">
                                    <div class="flex justify-between items-start mb-4">
                                        <h4 class="font-extrabold text-slate-800">${t.texto}</h4>
                                        <button onclick="deleteTask(${t.id})" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash text-xs"></i></button>
                                    </div>
                                    <div class="space-y-2 mb-4">
                                        ${t.subtasks.map((s, i) => `
                                            <div class="flex items-center gap-3 text-xs">
                                                <input type="checkbox" ${s.completed ? 'checked' : ''} onchange="toggleSub(${t.id}, ${i})" class="w-4 h-4 accent-indigo-600 cursor-pointer">
                                                <span class="${s.completed ? 'text-slate-300 line-through' : 'text-slate-600 font-medium'}">${s.texto}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                    <div class="flex justify-between items-center mt-6">
                                        <div class="flex items-center gap-2">
                                            <div class="w-6 h-6 bg-slate-100 rounded-full flex items-center justify-center text-[8px] font-bold text-slate-500">${u.nombre[0]}</div>
                                            <span class="text-[9px] font-bold text-slate-400 uppercase">${u.nombre}</span>
                                        </div>
                                        <span class="text-xs font-black text-indigo-600">${pct}%</span>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                target.appendChild(weekDiv);
            }
        }

        // LÓGICA DE DATOS
        function calcularPct(task) {
            const done = task.subtasks.filter(s => s.completed).length;
            return Math.round((done / task.subtasks.length) * 100);
        }

        function isTaskComplete(task) {
            return task.subtasks.every(s => s.completed);
        }

        function calcularEficienciaGlobal() {
            const mesTasks = db.filter(t => t.mes === mesActual.getMonth());
            if(mesTasks.length === 0) return 0;
            const totalPct = mesTasks.reduce((acc, t) => acc + calcularPct(t), 0);
            return Math.round(totalPct / mesTasks.length);
        }

        function abrirCreador() {
            const nombre = prompt("Nombre de la Actividad:");
            if(!nombre) return;
            const pasosStr = prompt("Etapas separadas por coma (ej: Paso 1, Paso 2, Paso 3):");
            if(!pasosStr) return;
            const sem = prompt("Semana (1-4):", "1");
            const resp = prompt(`ID del Responsable:\n1: Carlos\n2: Elena\n3: Marcos`, "1");

            db.push({
                id: Date.now(),
                texto: nombre,
                userId: parseInt(resp),
                semana: parseInt(sem),
                mes: mesActual.getMonth(),
                anio: mesActual.getFullYear(),
                subtasks: pasosStr.split(',').map(s => ({ texto: s.trim(), completed: false }))
            });
            save();
        }

        function toggleSub(tId, sIdx) {
            const t = db.find(t => t.id === tId);
            t.subtasks[sIdx].completed = !t.subtasks[sIdx].completed;
            save();
        }

        function deleteTask(id) { if(confirm('¿Borrar?')) { db = db.filter(t => t.id !== id); save(); } }
        function save() { localStorage.setItem('cm_pro_db', JSON.stringify(db)); render(); }
        function cambiarMes(d) { mesActual.setMonth(mesActual.getMonth() + d); render(); }

        window.onload = init;
    </script>
</body>
</html>
