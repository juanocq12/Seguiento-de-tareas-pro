<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Ultra | Gestión de Actividades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #1e293b; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.4); }
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0,0,0,0.03); }
        .sidebar-item:hover { background: rgba(37, 99, 235, 0.1); color: var(--primary); }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 15px; height: 15px; background: var(--primary); border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body class="antialiased">

    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900">
        <div class="bg-white p-12 rounded-[40px] shadow-2xl w-full max-w-md text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 rotate-12 shadow-xl shadow-blue-500/30">
                <i class="fas fa-layer-group text-white text-3xl"></i>
            </div>
            <h2 class="text-4xl font-black mb-2 text-slate-800">TaskMaster</h2>
            <p class="text-slate-400 mb-8 font-medium italic">Tu flujo de trabajo profesional</p>
            <input type="text" id="username" placeholder="Nombre de usuario" 
                class="w-full bg-slate-100 border-none p-4 rounded-2xl mb-4 text-center text-lg outline-none focus:ring-4 focus:ring-blue-100 transition-all">
            <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 transition transform hover:scale-[1.02]">
                Entrar al Tablero
            </button>
        </div>
    </div>

    <div id="app" class="hidden flex min-h-screen">
        
        <aside class="w-72 bg-white border-r border-slate-100 flex flex-col p-6 sticky top-0 h-screen">
            <div class="flex items-center gap-3 mb-10 px-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <i class="fas fa-check-double text-white text-xs"></i>
                </div>
                <span class="font-extrabold text-xl tracking-tight">TM ULTRA</span>
            </div>

            <nav class="flex-1 space-y-2">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Planificación</p>
                <div class="flex items-center justify-between bg-slate-50 p-4 rounded-2xl border border-slate-100 mb-6">
                    <button onclick="changeMonth(-1)" class="text-slate-400 hover:text-blue-600"><i class="fas fa-chevron-left"></i></button>
                    <span id="current-month-display" class="font-bold text-sm uppercase">Junio 2024</span>
                    <button onclick="changeMonth(1)" class="text-slate-400 hover:text-blue-600"><i class="fas fa-chevron-right"></i></button>
                </div>

                <div class="space-y-4">
                    <div class="bg-blue-50 p-4 rounded-2xl">
                        <p class="text-[10px] font-bold text-blue-400 uppercase mb-2">Progreso Mensual</p>
                        <div class="flex items-center justify-between mb-1">
                            <span id="monthly-pct" class="text-2xl font-black text-blue-700">0%</span>
                        </div>
                        <div class="w-full bg-white h-2 rounded-full overflow-hidden">
                            <div id="monthly-bar" class="h-full bg-blue-600 rounded-full transition-all duration-1000" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="mt-auto pt-6 border-t border-slate-100">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-slate-200 rounded-full flex items-center justify-center font-bold text-slate-600" id="user-avatar">?</div>
                    <div>
                        <p id="display-name" class="font-bold text-sm truncate w-32">Usuario</p>
                        <button onclick="logout()" class="text-[10px] text-red-400 font-bold uppercase hover:text-red-600">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 p-8">
            <div class="glass p-6 rounded-[32px] mb-8 flex flex-wrap items-center gap-4 card-shadow">
                <div class="flex-1 min-w-[250px]">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">¿Qué actividad vas a realizar?</label>
                    <input type="text" id="task-input" placeholder="Ej: Reporte de ventas semanal..." 
                        class="w-full bg-transparent p-2 text-lg font-semibold outline-none border-b-2 border-slate-100 focus:border-blue-500 transition-all">
                </div>
                <div class="w-48">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Asignar Semana</label>
                    <select id="week-input" class="w-full bg-slate-50 p-3 rounded-xl font-bold text-slate-600 outline-none">
                        <option value="1">Semana 1</option>
                        <option value="2">Semana 2</option>
                        <option value="3">Semana 3</option>
                        <option value="4">Semana 4</option>
                        <option value="5">Semana 5</option>
                    </select>
                </div>
                <button onclick="addTask()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition flex items-center gap-2">
                    <i class="fas fa-plus"></i> Asignar
                </button>
            </div>

            <div id="weeks-container" class="space-y-10">
                </div>
        </main>
    </div>

    <script>
        let currentUser = "";
        let viewDate = new Date();
        let db = JSON.parse(localStorage.getItem('tm_ultra_db')) || [];

        function login() {
            const name = document.getElementById('username').value;
            if (!name) return;
            currentUser = name;
            localStorage.setItem('tm_last_user', name);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('display-name').innerText = name;
            document.getElementById('user-avatar').innerText = name.charAt(0).toUpperCase();
            render();
        }

        function addTask() {
            const input = document.getElementById('task-input');
            const week = document.getElementById('week-input');
            if (!input.value) return;

            const task = {
                id: Date.now(),
                user: currentUser,
                text: input.value,
                week: parseInt(week.value),
                month: viewDate.getMonth(),
                year: viewDate.getFullYear(),
                progress: 0,
                status: 'Pendiente', // Pendiente, Proceso, Finalizado
                timestamp: new Date().toLocaleString()
            };

            db.push(task);
            input.value = "";
            save();
        }

        function updateProgress(id, val) {
            db = db.map(t => {
                if(t.id === id) {
                    let status = 'Pendiente';
                    if(val > 0) status = 'Proceso';
                    if(val == 100) status = 'Finalizado';
                    return {...t, progress: parseInt(val), status: status};
                }
                return t;
            });
            save();
        }

        function deleteTask(id) {
            if(confirm('¿Eliminar esta actividad?')) {
                db = db.filter(t => t.id !== id);
                save();
            }
        }

        function changeMonth(step) {
            viewDate.setMonth(viewDate.getMonth() + step);
            render();
        }

        function save() {
            localStorage.setItem('tm_ultra_db', JSON.stringify(db));
            render();
        }

        function render() {
            const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            document.getElementById('current-month-display').innerText = `${monthNames[viewDate.getMonth()]} ${viewDate.getFullYear()}`;

            const container = document.getElementById('weeks-container');
            container.innerHTML = "";

            // Filtro por usuario y fecha
            const monthlyTasks = db.filter(t => t.user === currentUser && t.month === viewDate.getMonth() && t.year === viewDate.getFullYear());

            for (let w = 1; w <= 5; w++) {
                const weekTasks = monthlyTasks.filter(t => t.week === w);
                const weekDiv = document.createElement('div');
                weekDiv.className = "animate__animated animate__fadeIn";
                weekDiv.innerHTML = `
                    <div class="flex items-center gap-4 mb-4">
                        <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em]">Semana 0${w}</h3>
                        <div class="h-[1px] flex-1 bg-slate-200"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${weekTasks.length ? weekTasks.map(t => `
                            <div class="glass p-6 rounded-[28px] card-shadow border-l-8 ${t.progress == 100 ? 'border-green-500' : (t.progress > 0 ? 'border-blue-400' : 'border-slate-200')}">
                                <div class="flex justify-between items-start mb-4">
                                    <span class="text-[9px] font-bold px-2 py-1 rounded-full ${t.status === 'Finalizado' ? 'bg-green-100 text-green-600' : 'bg-blue-100 text-blue-600'} uppercase">
                                        ${t.status}
                                    </span>
                                    <button onclick="deleteTask(${t.id})" class="text-slate-300 hover:text-red-500 transition"><i class="fas fa-trash-alt text-xs"></i></button>
                                </div>
                                <h4 class="font-bold text-slate-800 mb-6 leading-tight h-12 overflow-hidden">${t.text}</h4>
                                
                                <div class="space-y-2">
                                    <div class="flex justify-between text-[10px] font-bold">
                                        <span class="text-slate-400 italic">${t.timestamp}</span>
                                        <span class="text-blue-600">${t.progress}%</span>
                                    </div>
                                    <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                                        <div class="h-full bg-blue-600 transition-all duration-500" style="width: ${t.progress}%"></div>
                                    </div>
                                    <input type="range" min="0" max="100" value="${t.progress}" 
                                        oninput="updateProgress(${t.id}, this.value)"
                                        class="w-full h-1.5 bg-transparent appearance-none cursor-pointer">
                                </div>
                            </div>
                        `).join('') : `
                            <div class="col-span-full py-4 border-2 border-dashed border-slate-200 rounded-[28px] text-center text-slate-300 text-sm">
                                No hay actividades para esta semana
                            </div>
                        `}
                    </div>
                `;
                container.appendChild(weekDiv);
            }

            // Global Stats
            const totalProgress = monthlyTasks.reduce((acc, t) => acc + t.progress, 0);
            const monthlyPct = monthlyTasks.length ? Math.round(totalProgress / monthlyTasks.length) : 0;
            document.getElementById('monthly-pct').innerText = monthlyPct + "%";
            document.getElementById('monthly-bar').style.width = monthlyPct + "%";
        }

        function logout() {
            localStorage.removeItem('tm_last_user');
            location.reload();
        }

        window.onload = () => {
            const last = localStorage.getItem('tm_last_user');
            if (last) {
                document.getElementById('username').value = last;
                login();
            }
        }
    </script>
</body>
</html>
