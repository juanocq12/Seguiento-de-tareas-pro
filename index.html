<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Ultra | Enterprise OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap');
        :root { --bg: #0b0f1a; --card: #161c2d; --accent: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #f8fafc; overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(22, 28, 45, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .pomodoro-active { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .task-card:hover { border-color: var(--accent); transform: scale(1.02); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#05070a]">
        <div class="glass p-12 rounded-3xl shadow-2xl w-full max-w-lg text-center border-blue-500/20">
            <div class="relative inline-block mb-8">
                <div class="absolute -inset-1 bg-blue-500 rounded-full blur opacity-25"></div>
                <i class="fas fa-rocket text-6xl text-blue-500 relative"></i>
            </div>
            <h2 class="text-4xl font-black mb-2 tracking-tighter">TASK<span class="text-blue-500">MASTER</span></h2>
            <p class="text-slate-400 mb-8 font-light">SISTEMA OPERATIVO DE PRODUCTIVIDAD V1.0</p>
            <input type="text" id="username" placeholder="Ingrese Credencial de Usuario" 
                class="w-full bg-slate-900/50 border border-slate-700 p-4 rounded-xl mb-4 text-center text-xl mono focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            <button onclick="initApp()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all uppercase tracking-widest">
                Iniciar Secuencia
            </button>
        </div>
    </div>

    <div id="dashboard" class="hidden flex flex-col h-screen">
        <header class="glass h-16 px-8 flex justify-between items-center border-b border-white/5">
            <div class="flex items-center gap-4">
                <span class="bg-blue-500 text-[10px] font-bold px-2 py-0.5 rounded text-white uppercase">Network Active</span>
                <h1 class="font-bold tracking-tighter text-lg uppercase"><i class="fas fa-cpu mr-2 text-blue-500"></i>Core Panel</h1>
            </div>
            
            <div class="flex items-center gap-8">
                <div class="flex flex-col items-end">
                    <span id="display-user" class="text-xs font-bold text-blue-400 mono"></span>
                    <span id="real-time" class="text-[10px] text-slate-500 mono">00:00:00</span>
                </div>
                <button onclick="logout()" class="text-slate-500 hover:text-red-500 transition-colors"><i class="fas fa-power-off"></i></button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-80 glass border-r border-white/5 p-6 flex flex-col gap-6">
                <div id="pomo-card" class="bg-slate-900/80 rounded-2xl p-6 border border-white/5 text-center">
                    <h3 class="text-[10px] font-bold text-slate-500 uppercase mb-4 tracking-[0.2em]">Deep Work Timer</h3>
                    <div id="pomo-timer" class="text-5xl font-black mono mb-6 text-blue-100">25:00</div>
                    <div class="flex gap-2 justify-center">
                        <button id="pomo-btn" onclick="togglePomo()" class="bg-blue-600 hover:bg-blue-500 w-full py-2 rounded-lg text-sm font-bold transition">START</button>
                        <button onclick="resetPomo()" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition"><i class="fas fa-redo-alt text-xs"></i></button>
                    </div>
                    <p id="pomo-status" class="text-[10px] mt-4 text-slate-500 italic">Listo para enfocar</p>
                </div>

                <div class="flex-1">
                    <h3 class="text-[10px] font-bold text-slate-500 uppercase mb-4 tracking-[0.2em]">Efficiency Metric</h3>
                    <div class="relative pt-1">
                        <div class="overflow-hidden h-2 mb-4 text-xs flex rounded bg-slate-800">
                            <div id="eff-bar" style="width:0%" class="shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center bg-blue-500 transition-all duration-500"></div>
                        </div>
                        <div class="flex justify-between text-[10px] mono text-slate-400">
                            <span>0%</span>
                            <span id="eff-val">0% COMPLETED</span>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="flex-1 overflow-y-auto p-8">
                <div class="glass p-4 rounded-2xl mb-8 flex gap-4 border-blue-500/10">
                    <input type="text" id="new-task-text" placeholder="Asignar nueva función al sistema..." 
                        class="flex-1 bg-transparent p-3 outline-none text-sm mono">
                    <select id="new-task-priority" class="bg-slate-800 border-none rounded-lg text-xs font-bold px-4 outline-none">
                        <option value="low">BAJA</option>
                        <option value="medium">MEDIA</option>
                        <option value="high">ALTA</option>
                    </select>
                    <button onclick="addTask()" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-tighter">
                        Deploy Task
                    </button>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="flex flex-col gap-4">
                        <h4 class="text-xs font-bold text-slate-500 flex items-center justify-between px-2">
                            <span><i class="fas fa-inbox mr-2"></i> BACKLOG</span>
                            <span id="count-todo" class="text-[10px] bg-slate-800 py-0.5 px-2 rounded-full">0</span>
                        </h4>
                        <div id="col-todo" class="flex flex-col gap-4 min-h-[500px]"></div>
                    </div>

                    <div class="flex flex-col gap-4">
                        <h4 class="text-xs font-bold text-yellow-500/80 flex items-center justify-between px-2">
                            <span><i class="fas fa-bolt mr-2 text-yellow-500"></i> ACTIVE OPS</span>
                            <span id="count-progress" class="text-[10px] bg-slate-800 py-0.5 px-2 rounded-full text-white">0</span>
                        </h4>
                        <div id="col-progress" class="flex flex-col gap-4 min-h-[500px]"></div>
                    </div>

                    <div class="flex flex-col gap-4">
                        <h4 class="text-xs font-bold text-green-500/80 flex items-center justify-between px-2">
                            <span><i class="fas fa-check-double mr-2 text-green-500"></i> ARCHIVE</span>
                            <span id="count-done" class="text-[10px] bg-slate-800 py-0.5 px-2 rounded-full text-white">0</span>
                        </h4>
                        <div id="col-done" class="flex flex-col gap-4 min-h-[500px]"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let user = "";
        let db = [];
        let pomoTime = 25 * 60;
        let pomoInterval = null;
        let isWorking = true;

        // --- CORE APP ---
        function initApp() {
            const input = document.getElementById('username');
            if (!input.value) return;
            user = input.value.toUpperCase();
            localStorage.setItem('taskmaster_user', user);
            
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('display-user').innerText = `ID: ${user}`;
            
            loadData();
            startClock();
        }

        function startClock() {
            setInterval(() => {
                document.getElementById('real-time').innerText = new Date().toLocaleTimeString();
            }, 1000);
        }

        // --- POMODORO LOGIC ---
        function togglePomo() {
            const btn = document.getElementById('pomo-btn');
            const card = document.getElementById('pomo-card');

            if (pomoInterval) {
                clearInterval(pomoInterval);
                pomoInterval = null;
                btn.innerText = "RESUME";
                card.classList.remove('pomodoro-active');
            } else {
                card.classList.add('pomodoro-active');
                btn.innerText = "PAUSE";
                pomoInterval = setInterval(() => {
                    pomoTime--;
                    updatePomoDisplay();
                    if (pomoTime <= 0) finishPomo();
                }, 1000);
            }
        }

        function resetPomo() {
            clearInterval(pomoInterval);
            pomoInterval = null;
            isWorking = true;
            pomoTime = 25 * 60;
            document.getElementById('pomo-btn').innerText = "START";
            document.getElementById('pomo-card').classList.remove('pomodoro-active');
            updatePomoDisplay();
        }

        function updatePomoDisplay() {
            const mins = Math.floor(pomoTime / 60);
            const secs = pomoTime % 60;
            document.getElementById('pomo-timer').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function finishPomo() {
            clearInterval(pomoInterval);
            alert(isWorking ? "¡Ciclo de trabajo completado! Toma un descanso." : "¡Descanso terminado! A trabajar.");
            isWorking = !isWorking;
            pomoTime = (isWorking ? 25 : 5) * 60;
            resetPomo();
        }

        // --- TASK LOGIC ---
        function addTask() {
            const text = document.getElementById('new-task-text');
            const priority = document.getElementById('new-task-priority');
            if (!text.value) return;

            db.push({
                id: Date.now(),
                content: text.value,
                status: 'todo',
                priority: priority.value,
                created: new Date().toLocaleDateString()
            });

            text.value = "";
            saveAndRender();
        }

        function moveTask(id, newStatus) {
            db = db.map(t => t.id === id ? {...t, status: newStatus} : t);
            saveAndRender();
        }

        function deleteTask(id) {
            db = db.filter(t => t.id !== id);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem(`tm_db_${user}`, JSON.stringify(db));
            render();
        }

        function loadData() {
            const saved = localStorage.getItem(`tm_db_${user}`);
            db = saved ? JSON.parse(saved) : [];
            render();
        }

        function render() {
            const cols = {
                todo: document.getElementById('col-todo'),
                progress: document.getElementById('col-progress'),
                done: document.getElementById('col-done')
            };

            Object.values(cols).forEach(c => c.innerHTML = "");

            db.forEach(task => {
                const card = document.createElement('div');
                card.className = `task-card glass p-5 rounded-2xl border-l-4 transition-all duration-300 ${getPriorityClass(task.priority)}`;
                card.innerHTML = `
                    <p class="text-sm font-semibold mb-4 leading-relaxed">${task.content}</p>
                    <div class="flex justify-between items-center border-t border-white/5 pt-4">
                        <button onclick="deleteTask(${task.id})" class="text-slate-600 hover:text-red-500 transition"><i class="fas fa-trash-alt"></i></button>
                        <div class="flex gap-2">
                            ${task.status !== 'todo' ? `<button onclick="moveTask(${task.id}, 'todo')" class="bg-slate-800 p-2 rounded-lg text-[10px] hover:bg-blue-600"><i class="fas fa-arrow-left"></i></button>` : ''}
                            ${task.status !== 'progress' ? `<button onclick="moveTask(${task.id}, 'progress')" class="bg-slate-800 p-2 rounded-lg text-[10px] hover:bg-yellow-600 text-yellow-500 hover:text-white font-bold">WORKING</button>` : ''}
                            ${task.status !== 'done' ? `<button onclick="moveTask(${task.id}, 'done')" class="bg-blue-600 p-2 rounded-lg text-[10px] hover:bg-green-600 font-bold">COMPLETE</button>` : ''}
                        </div>
                    </div>
                `;
                cols[task.status].appendChild(card);
            });

            updateStats();
        }

        function getPriorityClass(p) {
            if(p === 'high') return 'border-red-500 bg-red-500/5';
            if(p === 'medium') return 'border-yellow-500 bg-yellow-500/5';
            return 'border-blue-500 bg-blue-500/5';
        }

        function updateStats() {
            const done = db.filter(t => t.status === 'done').length;
            const total = db.length;
            const eff = total ? Math.round((done / total) * 100) : 0;
            
            document.getElementById('eff-bar').style.width = eff + '%';
            document.getElementById('eff-val').innerText = `${eff}% COMPLETED`;
            document.getElementById('count-todo').innerText = db.filter(t => t.status === 'todo').length;
            document.getElementById('count-progress').innerText = db.filter(t => t.status === 'progress').length;
            document.getElementById('count-done').innerText = done;
        }

        function logout() {
            localStorage.removeItem('taskmaster_user');
            location.reload();
        }

        window.onload = () => {
            const last = localStorage.getItem('taskmaster_user');
            if (last) {
                document.getElementById('username').value = last;
                initApp();
            }
        }
    </script>
</body>
</html>
