<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClickMaster Team 4.0 | Hub de Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f4f7fa; color: #2d333a; }
        .sidebar { background-color: #1e2227; color: #a0a6ad; }
        .active-link { background: #3b3f46; color: white; border-left: 4px solid #7b68ee; }
        .card { background: white; border: 1px solid #e1e4e8; border-radius: 12px; transition: 0.3s; }
        .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .custom-range { accent-color: #7b68ee; width: 100%; cursor: pointer; }
        #email-modal { background: rgba(0,0,0,0.6); display: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="login-screen" class="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900">
        <div class="bg-white p-10 rounded-[30px] shadow-2xl text-center max-w-sm w-full">
            <h2 class="text-3xl font-black mb-4">Administrador <span class="text-purple-600">Pro</span></h2>
            <p class="text-gray-400 mb-6">Panel de control de equipos</p>
            <input type="text" id="admin-name" placeholder="Tu Nombre" class="w-full p-4 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-purple-400" value="Admin Global">
            <button onclick="iniciarSesion()" class="w-full bg-[#7b68ee] text-white font-bold py-4 rounded-xl shadow-lg">Acceder al Workspace</button>
        </div>
    </div>

    <aside class="w-72 sidebar flex flex-col h-screen shrink-0">
        <div class="p-6 border-b border-gray-700 flex items-center gap-3">
            <div class="bg-purple-600 p-2 rounded-lg"><i class="fas fa-users-cog text-white"></i></div>
            <span class="font-bold text-white tracking-tight">TEAM OPS 4.0</span>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-6">
            <div>
                <p class="text-[11px] font-bold text-gray-500 uppercase mb-3">Vistas Globales</p>
                <button onclick="cambiarVista('global')" class="w-full text-left p-3 rounded-xl flex items-center gap-3 transition active-link" id="btn-global">
                    <i class="fas fa-globe"></i> Visión General
                </button>
            </div>

            <div>
                <p class="text-[11px] font-bold text-gray-500 uppercase mb-3">Seguimiento de Equipo</p>
                <div id="team-list" class="space-y-1">
                    </div>
            </div>
        </div>

        <div class="p-6 border-t border-gray-700">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-purple-500 rounded-full flex items-center justify-center font-bold text-white">A</div>
                <div class="flex-1 truncate">
                    <p class="text-sm font-bold text-white" id="admin-display">Admin</p>
                    <p class="text-[10px] text-green-400">Online</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8 z-10">
            <h1 class="font-black text-xl text-gray-700" id="view-title">Dashboard Global</h1>
            <div class="flex items-center gap-6">
                <div class="flex items-center bg-gray-100 rounded-lg p-1">
                    <button onclick="cambiarMes(-1)" class="p-1 px-3 hover:text-purple-600 font-bold"><</button>
                    <span id="label-mes" class="text-xs font-bold uppercase w-24 text-center">Abril 2024</span>
                    <button onclick="cambiarMes(1)" class="p-1 px-3 hover:text-purple-600 font-bold">></button>
                </div>
                <button onclick="enviarRecordatorios()" class="bg-yellow-500 text-white text-xs font-bold px-4 py-2 rounded-lg shadow-md hover:bg-yellow-600">
                    <i class="fas fa-paper-plane mr-2"></i> RECORDATORIO EMAIL
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
            <div class="max-w-6xl mx-auto mb-8 bg-white p-6 rounded-2xl border flex flex-wrap gap-4 items-end shadow-sm">
                <div class="flex-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase">Nueva Tarea</label>
                    <input type="text" id="task-text" placeholder="¿Qué debe hacerse?" class="w-full mt-1 p-2 border-b-2 border-gray-100 outline-none focus:border-purple-500 font-medium">
                </div>
                <div class="w-40">
                    <label class="text-[10px] font-black text-gray-400 uppercase">Asignar a</label>
                    <select id="task-assignee" class="w-full mt-1 p-2 bg-gray-50 border rounded-lg text-xs font-bold"></select>
                </div>
                <div class="w-32">
                    <label class="text-[10px] font-black text-gray-400 uppercase">Semana</label>
                    <select id="task-week" class="w-full mt-1 p-2 bg-gray-50 border rounded-lg text-xs font-bold">
                        <option value="1">Semana 1</option><option value="2">Semana 2</option>
                        <option value="3">Semana 3</option><option value="4">Semana 4</option>
                    </select>
                </div>
                <button onclick="addTask()" class="bg-[#7b68ee] text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-purple-500/20">ASIGNAR</button>
            </div>

            <div id="content-container" class="max-w-6xl mx-auto space-y-10">
                </div>
        </div>
    </main>

    <div id="email-modal" class="fixed inset-0 z-[300] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[30px] p-8 shadow-2xl animate__animated animate__zoomIn">
            <div class="w-16 h-16 bg-yellow-100 text-yellow-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fas fa-envelope-open-text"></i>
            </div>
            <h3 class="text-center font-black text-xl mb-2">Enviando Recordatorios</h3>
            <p class="text-gray-500 text-sm text-center mb-6">El sistema está notificando a los responsables con tareas pendientes.</p>
            <div id="email-log" class="bg-slate-50 p-4 rounded-xl text-[10px] font-mono h-40 overflow-y-auto mb-6">
                </div>
            <button onclick="cerrarModal()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Entendido</button>
        </div>
    </div>

    <script>
        // DATOS DE PRUEBA INICIALES
        const equipo = [
            { id: 1, nombre: "Carlos Ruiz", email: "cruiz@empresa.com", cargo: "Desarrollador Backend" },
            { id: 2, nombre: "Elena Gómez", email: "egomez@empresa.com", cargo: "Diseñadora UX/UI" },
            { id: 3, nombre: "Marcos Sosa", email: "msosa@empresa.com", cargo: "Data Analyst" },
            { id: 4, nombre: "Sofía Paez", email: "spaez@empresa.com", cargo: "Product Manager" }
        ];

        let admin = "";
        let vistaActual = "global"; // "global" o ID del usuario
        let fechaVer = new Date();
        let tareas = JSON.parse(localStorage.getItem('tm_team_db')) || [];

        function iniciarSesion() {
            const name = document.getElementById('admin-name').value;
            if(!name) return;
            admin = name;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('admin-display').innerText = admin;
            cargarEquipo();
            render();
        }

        function cargarEquipo() {
            const list = document.getElementById('team-list');
            const select = document.getElementById('task-assignee');
            list.innerHTML = "";
            select.innerHTML = "";

            equipo.forEach(p => {
                list.innerHTML += `
                    <button onclick="cambiarVista(${p.id})" id="btn-user-${p.id}" class="w-full text-left p-3 rounded-xl flex items-center gap-3 transition hover:bg-gray-700 text-sm">
                        <div class="w-6 h-6 bg-slate-600 rounded-full flex items-center justify-center text-[10px] text-white">${p.nombre[0]}</div>
                        ${p.nombre}
                    </button>
                `;
                select.innerHTML += `<option value="${p.id}">${p.nombre}</option>`;
            });
        }

        function addTask() {
            const text = document.getElementById('task-text');
            const user = document.getElementById('task-assignee');
            const week = document.getElementById('task-week');
            if(!text.value) return;

            tareas.push({
                id: Date.now(),
                texto: text.value,
                responsableId: parseInt(user.value),
                semana: parseInt(week.value),
                mes: fechaVer.getMonth(),
                anio: fechaVer.getFullYear(),
                progreso: 0,
                status: 'To Do'
            });
            text.value = "";
            save();
        }

        function cambiarVista(id) {
            vistaActual = id;
            document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active-link'));
            if(id === 'global') {
                document.getElementById('btn-global').classList.add('active-link');
                document.getElementById('view-title').innerText = "Dashboard Global";
            } else {
                document.getElementById(`btn-user-${id}`).classList.add('active-link');
                const p = equipo.find(u => u.id === id);
                document.getElementById('view-title').innerText = `Perfil de: ${p.nombre}`;
            }
            render();
        }

        function updateProgress(id, val) {
            tareas = tareas.map(t => {
                if(t.id === id) {
                    let st = val == 100 ? 'Closed' : (val > 0 ? 'In Progress' : 'To Do');
                    return {...t, progreso: parseInt(val), status: st};
                }
                return t;
            });
            save();
        }

        function enviarRecordatorios() {
            const modal = document.getElementById('email-modal');
            const log = document.getElementById('email-log');
            modal.style.display = "flex";
            log.innerHTML = "Iniciando servidor de correo...<br>";

            const pendientes = tareas.filter(t => t.progreso < 100);
            
            pendientes.forEach((t, i) => {
                const p = equipo.find(u => u.id === t.responsableId);
                setTimeout(() => {
                    log.innerHTML += `<span class="text-blue-500">[ENVIADO]</span> Para: ${p.email} | Tarea: "${t.texto}" - Status: ${t.progreso}%<br>`;
                    log.scrollTop = log.scrollHeight;
                }, i * 600);
            });
        }

        function render() {
            const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            document.getElementById('label-mes').innerText = `${months[fechaVer.getMonth()]} ${fechaVer.getFullYear()}`;

            const container = document.getElementById('content-container');
            container.innerHTML = "";

            let filtradas = tareas.filter(t => t.mes === fechaVer.getMonth() && t.anio === fechaVer.getFullYear());
            if(vistaActual !== 'global') {
                filtradas = filtradas.filter(t => t.responsableId === vistaActual);
            }

            for(let w=1; w<=4; w++) {
                const weekTasks = filtradas.filter(t => t.semana === w);
                const section = document.createElement('div');
                section.innerHTML = `
                    <div class="flex items-center gap-3 mb-4">
                        <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest">Semana ${w}</h2>
                        <div class="h-[1px] flex-1 bg-gray-200"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${weekTasks.length ? weekTasks.map(t => {
                            const p = equipo.find(u => u.id === t.responsableId);
                            return `
                            <div class="card p-5">
                                <div class="flex justify-between items-start mb-4">
                                    <div class="flex items-center gap-2">
                                        <div class="w-2 h-2 rounded-full ${t.progreso == 100 ? 'bg-green-500' : 'bg-purple-500'}"></div>
                                        <span class="text-[10px] font-bold uppercase text-gray-400">${t.status}</span>
                                    </div>
                                    <button onclick="eliminar(${t.id})" class="text-gray-300 hover:text-red-500 transition"><i class="fas fa-trash-alt text-xs"></i></button>
                                </div>
                                <h4 class="font-bold text-gray-800 mb-2 leading-tight">${t.texto}</h4>
                                <div class="flex items-center gap-2 mb-6">
                                    <div class="w-5 h-5 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center text-[8px] font-bold">${p.nombre[0]}</div>
                                    <span class="text-[10px] font-medium text-gray-500">${p.nombre}</span>
                                </div>
                                <div class="space-y-2">
                                    <div class="flex justify-between text-[10px] font-bold text-gray-400">
                                        <span>Progreso</span>
                                        <span class="text-purple-600">${t.progreso}%</span>
                                    </div>
                                    <input type="range" value="${t.progreso}" oninput="updateProgress(${t.id}, this.value)" class="custom-range">
                                </div>
                            </div>`;
                        }).join('') : `<div class="col-span-full py-6 border-2 border-dashed border-gray-200 rounded-xl text-center text-gray-300 text-xs">Sin actividades asignadas</div>`}
                    </div>
                `;
                container.appendChild(section);
            }
        }

        function eliminar(id) {
            if(confirm('¿Eliminar esta tarea asignada?')) {
                tareas = tareas.filter(t => t.id !== id);
                save();
            }
        }
        function save() { localStorage.setItem('tm_team_db', JSON.stringify(tareas)); render(); }
        function cambiarMes(d) { fechaVer.setMonth(fechaVer.getMonth() + d); render(); }
        function cerrarModal() { document.getElementById('email-modal').style.display = "none"; }
    </script>
</body>
</html>
